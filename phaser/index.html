<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Space Invader - Phaser Prototype</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #07182a;
      color: #dbe9f4;
      font-family: "JetBrains Mono", monospace;
    }
    #game-root {
      width: 100vw;
      height: 100vh;
    }
    #badge {
      position: fixed;
      left: 12px;
      bottom: 12px;
      padding: 6px 10px;
      border: 1px solid #00aabf;
      background: rgba(10, 27, 42, 0.75);
      font-size: 12px;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="game-root"></div>
  <div id="badge">Phaser migration prototype</div>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
